{% extends "base.html" %}
{% block content %}

<style>
  /* Form container */
  form {
    max-width: 700px;
    margin: 20px auto;
    padding: 25px;
    background-color: #f9f9f9;
    border-radius: 12px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
  }

  h2 {
    text-align: center;
    color: #333;
    margin-bottom: 25px;
  }

  fieldset {
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 20px 15px 15px 15px;
    margin-bottom: 40px;
  }

  legend {
    font-weight: bold;
    padding: 0 10px;
    color: #555;
  }

  label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
    color: #333;
  }

  input[type="text"],
  input[type="number"],
  input[type="email"],
  input[type="password"],
  input[type="range"] {
    width: 100%;
    padding: 8px 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }

  input[type="range"] {
    padding: 0;
  }

  /* Checkbox layout */
  fieldset p {
    margin-top: 15px;
    font-weight: 500;
  }

  fieldset label input[type="checkbox"] {
    margin-right: 8px;
  }

  button[type="submit"] {
    display: block;
    width: 100%;
    padding: 12px;
    background-color: #4CAF50;
    color: white;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
    transition: background-color 0.3s ease;
  }

  button[type="submit"]:hover {
    background-color: #45a049;
  }
</style>

<h2>Elderly Account Registration</h2>

<form method="POST">

  <!-- ================= BASIC INFO ================= -->
  <fieldset>
    <legend>Basic Information</legend>

    <label>First Name</label>
    <input type="text" name="first_name" required>

    <label>Last Name</label>
    <input type="text" name="last_name" required>

    <label>Age</label>
    <input type="number" name="age" min="50" required>

    <label>Height (inches)</label>
    <input type="number" name="height_in" required>

    <label>Weight (lbs)</label>
    <input type="number" name="weight_lbs" required>
  </fieldset>

  <!-- ================= ACCOUNT INFO ================= -->
  <fieldset>
    <legend>Account Information</legend>

    <label>Username</label>
    <input type="text" name="username" required>

    <label>Password</label>
    <input type="password" name="password" required>

    <label>Phone</label>
    <input type="text" name="phone">

    <label>Email</label>
    <input type="email" name="email">
  </fieldset>

  <!-- ================= HEALTH INFO ================= -->
  <fieldset>
    <legend>Health Information</legend>

    <label>Medications (comma-separated)</label>
    <input type="text" name="medications">

    <label>Allergies (comma-separated)</label>
    <input type="text" name="allergies">

    <label>Dietary Restrictions</label>
    <input type="text" name="dietary_restrictions">
  </fieldset>

  <!-- ================= PREFERENCES ================= -->
  <fieldset>
    <legend>Preferences</legend>

    <label>Cooking Skill (1 = very basic, 5 = advanced)</label>
    <input type="range" min="1" max="5" name="cooking_skill" value="3">

    <p>Preferred Cuisines</p>
    <label><input type="checkbox" name="cuisines" value="american"> American</label>
    <label><input type="checkbox" name="cuisines" value="italian"> Italian</label>
    <label><input type="checkbox" name="cuisines" value="mexican"> Mexican</label>
    <label><input type="checkbox" name="cuisines" value="chinese"> Chinese</label>
    <label><input type="checkbox" name="cuisines" value="indian"> Indian</label>
    <label><input type="checkbox" name="cuisines" value="japanese"> Japanese</label>
  </fieldset>

  <!-- ================= MEAL TIMES ================= -->
  <fieldset>
    <legend>Meal Reminder Times</legend>
    <p>Set your preferred times for meal reminders</p>

    <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
      <label>Breakfast:</label>
      <input type="number" name="breakfast_hour" min="0" max="23" value="8" required style="width: 60px;">
      <span>:</span>
      <input type="number" name="breakfast_minute" min="0" max="59" value="0" required style="width: 60px;">
    </div>

    <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
      <label>Lunch:</label>
      <input type="number" name="lunch_hour" min="0" max="23" value="12" required style="width: 60px;">
      <span>:</span>
      <input type="number" name="lunch_minute" min="0" max="59" value="0" required style="width: 60px;">
    </div>

    <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
      <label>Dinner:</label>
      <input type="number" name="dinner_hour" min="0" max="23" value="18" required style="width: 60px;">
      <span>:</span>
      <input type="number" name="dinner_minute" min="0" max="59" value="0" required style="width: 60px;">
    </div>
  </fieldset>

  <button type="submit">Create Account</button>

</form>

{% endblock %}
