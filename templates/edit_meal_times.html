{% extends "base.html" %}

{% block content %}
<h2>Edit Meal Times for {{ user.name }}</h2>

<form method="POST">
    <fieldset>
        <legend>Set Meal Reminder Times</legend>
        <p>Set your preferred times for meal reminders</p>

        <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
            <label>Breakfast:</label>
            <input type="number" name="breakfast_hour" min="0" max="23" value="{{ meal_times.breakfast.hour }}" required style="width: 60px;">
            <span>:</span>
            <input type="number" name="breakfast_minute" min="0" max="59" value="{{ meal_times.breakfast.minute }}" required style="width: 60px;">
        </div>

        <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
            <label>Lunch:</label>
            <input type="number" name="lunch_hour" min="0" max="23" value="{{ meal_times.lunch.hour }}" required style="width: 60px;">
            <span>:</span>
            <input type="number" name="lunch_minute" min="0" max="59" value="{{ meal_times.lunch.minute }}" required style="width: 60px;">
        </div>

        <div style="display: flex; gap: 10px; align-items: center; margin-top: 15px;">
            <label>Dinner:</label>
            <input type="number" name="dinner_hour" min="0" max="23" value="{{ meal_times.dinner.hour }}" required style="width: 60px;">
            <span>:</span>
            <input type="number" name="dinner_minute" min="0" max="59" value="{{ meal_times.dinner.minute }}" required style="width: 60px;">
        </div>
    </fieldset>

    <button type="submit">Save Changes</button>
    <a href="/users" class="btn">Cancel</a>
</form>

{% endblock %}
