{% extends "base.html" %}

{% set page_class = "login-page" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='pages/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-page">
    <h2 class="login-title">Welcome to AgeTech House</h2>

    <div class="auth-container">

      <div class="auth-box">
          <h3>Log In</h3>
          <form method="POST" action="/login">
              <label>Username</label>
              <input type="text" name="username" placeholder="Enter your username" required>

              <label>Password</label>
              <input type="password" name="password" placeholder="Enter your password" required>

              <div class="button-group">
                  <button type="submit">Log In</button>
                  <p class="signup-text">Need an account?</p>
                  <a href="/register" class="signup-btn">Click Here to Sign Up</a>
              </div>
          </form>
      </div>

    </div>
</div>
{% endblock %}
